version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/applications.log
    encoding: utf-8
    maxBytes: 5242880   
    backupCount: 3

root:
  level: DEBUG
  handlers: [file]

loggers:
  rag_v2:
    level: DEBUG
    handlers: [file]
    propagate: false
  qdrant_client:
    level: WARNING
  httpx:
    level: WARNING
